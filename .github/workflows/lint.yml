name: Code Quality

on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ktlint:
    name: Kotlin Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run ktlint
        uses: musichin/ktlint-check@v4
        with:
          ktlint-version: '1.5.0'
          patterns: |
            app/src/**/*.kt
            !app/src/**/build/**
        continue-on-error: true

  detekt:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download detekt
        run: |
          curl -sSL "https://github.com/detekt/detekt/releases/download/v1.23.7/detekt-cli-1.23.7.zip" -o detekt.zip
          unzip -q detekt.zip -d detekt-cli

      - name: Run detekt
        run: |
          java -jar detekt-cli/detekt-cli-1.23.7/lib/detekt-cli-1.23.7-all.jar \
            --input app/src \
            --config detekt.yml \
            --build-upon-default-config \
            --report sarif:build/reports/detekt.sarif

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/detekt.sarif
        continue-on-error: true

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Remove local Java home override
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Run Android lint
        run: ./gradlew lintDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: app/build/reports/lint-results-debug.html
